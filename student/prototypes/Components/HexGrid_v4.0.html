<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexGrid v4.0 — Navigation & Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  /* Cinzel matches the rest of the Ninja app — HexGrid inherits this automatically */
  font-family: 'Cinzel', serif;
  display: flex;
  flex-direction: column;
}

.panes {
  display: flex;
  flex: 1;
  min-height: 100vh;
}

.pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  gap: 36px;
}

.pane--dark  { background: #05050A; }
.pane--light { background: #F0F0F0; }

.pane-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.pane--dark  .pane-label { color: rgba(255,255,255,0.2); }
.pane--light .pane-label { color: rgba(0,0,0,0.25); }

/* Count controls */
.count-controls {
  display: flex;
  gap: 6px;
}
.count-btn {
  font-family: monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.pane--dark .count-btn {
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: rgba(255,255,255,0.3);
}
.pane--dark .count-btn:hover  { border-color: rgba(255,255,255,0.28); color: rgba(255,255,255,0.7); }
.pane--dark .count-btn.active { border-color: rgba(255,255,255,0.5);  color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.05); }

.pane--light .count-btn {
  border: 1px solid rgba(0,0,0,0.15);
  background: transparent;
  color: rgba(0,0,0,0.35);
}
.pane--light .count-btn:hover  { border-color: rgba(0,0,0,0.35); color: rgba(0,0,0,0.7); }
.pane--light .count-btn.active { border-color: rgba(0,0,0,0.55); color: rgba(0,0,0,0.9); background: rgba(0,0,0,0.05); }

/* Nav mode controls */
.mode-controls {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.mode-btn {
  font-family: monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.pane--dark .mode-btn {
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent;
  color: rgba(255,255,255,0.2);
}
.pane--dark .mode-btn.active  { border-color: #8B1A1A; color: rgba(255,255,255,0.7); }
.pane--light .mode-btn {
  border: 1px solid rgba(0,0,0,0.1);
  background: transparent;
  color: rgba(0,0,0,0.25);
}
.pane--light .mode-btn.active { border-color: #8B1A1A; color: rgba(0,0,0,0.7); }

/* Event log */
.log {
  font-size: 10px;
  letter-spacing: 0.08em;
  min-height: 18px;
  text-align: center;
}
.pane--dark  .log { color: rgba(255,255,255,0.25); }
.pane--light .log { color: rgba(0,0,0,0.3); }

.divider {
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(128,128,128,0.25) 20%, rgba(128,128,128,0.25) 80%, transparent);
}

/* Hex container wrapper — flex layout handled by component itself */
.hex-wrap {
  width: 340px;
}
</style>
</head>
<body>

<div class="panes">

  <!-- DARK -->
  <div class="pane pane--dark">
    <div class="pane-label">Dark</div>
    <div class="hex-wrap">
      <div id="darkDemo"></div>
    </div>
    <div class="count-controls" id="darkCounts"></div>
    <div class="mode-controls" id="darkModes"></div>
    <div class="log" id="darkLog">select an item</div>
  </div>

  <div class="divider"></div>

  <!-- LIGHT -->
  <div class="pane pane--light">
    <div class="pane-label">Light</div>
    <div class="hex-wrap">
      <div id="lightDemo"></div>
    </div>
    <div class="count-controls" id="lightCounts"></div>
    <div class="mode-controls" id="lightModes"></div>
    <div class="log" id="lightLog">select an item</div>
  </div>

</div>

<script>
/* =====================================================================
   HexGrid v4.0 — hex-grid.js inlined
   ===================================================================== */

const _MENU_R = 108;
const _ITEM_R = _MENU_R * 0.59;
const _GAP    = 51;
const _S32    = Math.sqrt(3) / 2;
const _DEG    = Math.PI / 180;
const _FILL   = [0, 1, 2, 3, 4, 5];

function _hex(cx, cy, R) {
  return Array.from({ length: 6 }, (_, i) => {
    const a = (-90 + 60 * i) * _DEG;
    return { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) };
  });
}
function _normal(s) {
  const a = (-60 + 60 * s) * _DEG;
  return { dx: Math.cos(a), dy: Math.sin(a) };
}
function _itemCentre(side) {
  const d = (_MENU_R + _ITEM_R) * _S32 + _GAP;
  const n = _normal(side);
  return { x: n.dx * d, y: n.dy * d };
}
function _pts(verts) {
  return verts.map(v => `${v.x.toFixed(2)},${v.y.toFixed(2)}`).join(' ');
}

const _VIEWBOXES = {};
(function () {
  const PAD = 40;
  for (let count = 1; count <= 6; count++) {
    const all = [..._hex(0, 0, _MENU_R)];
    _FILL.slice(0, count).forEach(side => {
      const c = _itemCentre(side);
      _hex(c.x, c.y, _ITEM_R * 1.30).forEach(v => all.push(v));
    });
    const minX = Math.min(...all.map(v => v.x)) - PAD;
    const minY = Math.min(...all.map(v => v.y)) - PAD;
    const maxX = Math.max(...all.map(v => v.x)) + PAD;
    const maxY = Math.max(...all.map(v => v.y)) + PAD;
    _VIEWBOXES[count] = {
      x: minX, y: minY,
      w: maxX - minX,
      h: maxY - minY,
      aspect: (maxY - minY) / (maxX - minX),
    };
  }
})();

const THEMES = {
  dark: {
    hubFill:    '#000000',
    hubStroke:  '#FFFFFF',
    itemFill:   '#000000',
    itemStroke: '#FFFFFF',
    textFill:   '#FFFFFF',
    selRing:    '#8B1A1A',
    dimOpacity: '0.30',
    navBtnBg:   '#FFFFFF',
    navBtnText: '#000000',
  },
  light: {
    hubFill:    '#FFFFFF',
    hubStroke:  '#000000',
    itemFill:   '#FFFFFF',
    itemStroke: '#000000',
    textFill:   '#000000',
    selRing:    '#8B1A1A',
    dimOpacity: '0.25',
    navBtnBg:   '#000000',
    navBtnText: '#FFFFFF',
  },
};

const _NS = 'http://www.w3.org/2000/svg';
function _el(tag, attrs) {
  const e = document.createElementNS(_NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v));
  return e;
}

let _gridCounter = 0;

function createHexGrid(container, config = {}) {
  const root = typeof container === 'string'
    ? document.querySelector(container) : container;
  if (!root) throw new Error('HexGrid: container not found');

  const _gridId = ++_gridCounter;

  let _size     = config.size    ?? 400;
  let _count    = Math.min(Math.max(config.count ?? 6, 1), 6);
  let _items    = config.items   ?? [];
  let _hub      = config.hub     ?? {};
  let _navMode  = config.navMode ?? 'both';
  let _onGlobal = config.onItemClick ?? null;
  let _C        = THEMES[config.theme] ?? THEMES.dark;
  const _font   = config.font ?? getComputedStyle(root).fontFamily ?? 'system-ui, sans-serif';

  const _selected = new Set(
    _items.map((it, i) => it.active ? i : -1).filter(i => i >= 0)
  );

  /* Flex column so nav button sits below the SVG, not over it */
  root.style.display = 'flex';
  root.style.flexDirection = 'column';
  root.style.alignItems = 'flex-end';
  root.style.gap = '12px';

  const svg = _el('svg');
  svg.style.display = 'block';
  svg.style.alignSelf = 'center';
  root.appendChild(svg);

  /* Navigate button — in normal flow, below SVG */
  let _navTarget = null;
  const _navBtn  = document.createElement('button');
  _navBtn.style.cssText = `
    padding: 10px 20px;
    font-family: ${_font};
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: none; cursor: pointer;
    opacity: 0; pointer-events: none;
    min-height: 40px;
    transition: opacity 0.2s ease, transform 0.15s ease;
    z-index: 10;
  `;
  _navBtn.addEventListener('mouseenter', () => {
    if (parseFloat(_navBtn.style.opacity) > 0) _navBtn.style.transform = 'scale(1.04)';
  });
  _navBtn.addEventListener('mouseleave', () => { _navBtn.style.transform = 'scale(1)'; });
  _navBtn.addEventListener('click', () => {
    if (!_navTarget) return;
    if (_navTarget.onClick) _navTarget.onClick(_navTarget);
    if (_onGlobal)          _onGlobal(_navTarget);
    if (_navTarget.href)    window.location.href = _navTarget.href;
  });
  root.appendChild(_navBtn);

  function _showNavBtn(itemCfg) {
    _navTarget = itemCfg;
    _navBtn.textContent = itemCfg.label ? `→  ${itemCfg.label}` : '→  Go';
    _navBtn.style.background    = _C.navBtnBg;
    _navBtn.style.color         = _C.navBtnText;
    _navBtn.style.opacity       = '1';
    _navBtn.style.pointerEvents = 'auto';
  }
  function _hideNavBtn() {
    _navTarget = null;
    _navBtn.style.opacity       = '0';
    _navBtn.style.pointerEvents = 'none';
  }

  /* Text content helper */
  function _addText(parent, itemCfg, cx, cy, R) {
    const hasEmoji    = !!itemCfg.emoji;
    const hasLabel    = !!itemCfg.label;
    const hasSublabel = !!itemCfg.sublabel;
    const hasImage    = !!itemCfg.image;
    const tg = _el('g', { 'pointer-events': 'none' });

    if (hasEmoji && !hasImage) {
      const emojiY = hasLabel ? cy - R * 0.18 : cy;
      const em = _el('text', {
        x: cx, y: emojiY,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': R * (hasLabel ? 0.38 : 0.48),
      });
      em.textContent = itemCfg.emoji;
      tg.appendChild(em);
    }

    if (hasLabel) {
      let labelY = cy;
      if (hasEmoji && !hasImage) labelY = cy + R * 0.30;
      else if (hasSublabel)      labelY = cy - R * 0.14;

      const lbl = _el('text', {
        x: cx, y: labelY,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': R * 0.22,
        'font-family': _font,
        'font-weight': '600', 'letter-spacing': '0.03em',
        fill: hasImage ? '#FFFFFF' : _C.textFill,
      });
      if (hasImage) lbl.setAttribute('filter', `url(#hg-${_gridId}-textshadow)`);
      lbl.textContent = itemCfg.label;
      tg.appendChild(lbl);
    }

    if (hasSublabel) {
      const sub = _el('text', {
        x: cx, y: cy + R * 0.10,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-size': R * 0.16,
        'font-family': _font,
        fill: hasImage ? 'rgba(255,255,255,0.8)' : _C.textFill,
        opacity: hasImage ? '1' : '0.55',
      });
      sub.textContent = itemCfg.sublabel;
      tg.appendChild(sub);
    }

    parent.appendChild(tg);
  }

  const _itemRefs = [];
  let _satG = null;

  function _render() {
    svg.innerHTML = '';
    _itemRefs.length = 0;
    _satG = null;

    const vb = _VIEWBOXES[_count];
    svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
    svg.style.width  = _size + 'px';
    svg.style.height = Math.round(_size * vb.aspect) + 'px';

    const defs = _el('defs');
    const flt  = _el('filter', { id: `hg-${_gridId}-textshadow`, x: '-20%', y: '-20%', width: '140%', height: '140%' });
    flt.appendChild(_el('feDropShadow', { dx: '0', dy: '0', stdDeviation: '2', 'flood-color': '#000', 'flood-opacity': '0.8' }));
    defs.appendChild(flt);
    svg.appendChild(defs);

    /* Satellites */
    const satG = _el('g');
    _satG = satG;

    _FILL.slice(0, _count).forEach((side, i) => {
      const itemCfg  = _items[i] ?? {};
      const selected = _selected.has(i);
      const c        = _itemCentre(side);
      const verts    = _hex(c.x, c.y, _ITEM_R);
      const outerV   = _hex(c.x, c.y, _ITEM_R * 1.153);
      const ringV    = _hex(c.x, c.y, _ITEM_R * 1.30);
      const clipId   = `hg-${_gridId}-item-${i}`;

      const cp = _el('clipPath', { id: clipId });
      cp.appendChild(_el('polygon', { points: _pts(verts) }));
      defs.appendChild(cp);

      const g = _el('g');
      g.style.cssText = 'cursor:pointer; transition: opacity 0.2s ease;';
      if (itemCfg.disabled) { g.style.opacity = '0.3'; g.style.pointerEvents = 'none'; }

      const ringEl = _el('polygon', {
        points: _pts(ringV), fill: 'none',
        stroke: _C.selRing, 'stroke-width': '8',
        'stroke-opacity': selected ? '1' : '0',
        style: 'transition: stroke-opacity 0.3s ease',
      });
      g.appendChild(ringEl);

      g.appendChild(_el('polygon', {
        points: _pts(outerV), fill: 'none',
        stroke: _C.itemStroke, 'stroke-width': '0.75',
      }));

      g.appendChild(_el('polygon', {
        points: _pts(verts),
        fill: _C.itemFill, stroke: _C.itemStroke, 'stroke-width': '3',
      }));

      if (itemCfg.image) {
        g.appendChild(_el('image', {
          href: itemCfg.image,
          x: c.x - _ITEM_R, y: c.y - _ITEM_R,
          width: _ITEM_R * 2, height: _ITEM_R * 2,
          'clip-path': `url(#${clipId})`,
          preserveAspectRatio: 'xMidYMid slice',
          'pointer-events': 'none',
        }));
      }

      _addText(g, itemCfg, c.x, c.y, _ITEM_R);

      const hitEl = _el('polygon', { points: _pts(verts), fill: 'transparent' });

      hitEl.addEventListener('click', e => {
        if (itemCfg.disabled) return;
        const wasSelected = _selected.has(i);

        if (wasSelected && (_navMode === 'click2' || _navMode === 'both')) {
          if (itemCfg.onClick) itemCfg.onClick(itemCfg, e);
          if (_onGlobal)       _onGlobal(itemCfg, e);
          if (itemCfg.href)    window.location.href = itemCfg.href;
          return;
        }

        _selected.clear();
        _itemRefs.forEach(ref => ref.ringEl.setAttribute('stroke-opacity', '0'));
        _hideNavBtn();

        if (!wasSelected) {
          _selected.add(i);
          ringEl.setAttribute('stroke-opacity', '1');
          if (_navMode === 'button' || _navMode === 'both') _showNavBtn(itemCfg);
          if (itemCfg.onSelect) itemCfg.onSelect(itemCfg, e);
        }

        Array.from(satG.children).forEach((s, si) => {
          s.style.opacity = _selected.size === 0 || _selected.has(si) ? '1' : _C.dimOpacity;
        });
      });

      g.appendChild(hitEl);
      satG.appendChild(g);
      _itemRefs.push({ ringEl, item: itemCfg, index: i });
    });

    svg.appendChild(satG);

    /* Hub */
    const hubClipId = `hg-${_gridId}-hub`;
    const hubCp = _el('clipPath', { id: hubClipId });
    hubCp.appendChild(_el('polygon', { points: _pts(_hex(0, 0, _MENU_R)) }));
    defs.appendChild(hubCp);

    const hubG = _el('g');
    hubG.appendChild(_el('polygon', {
      points: _pts(_hex(0, 0, _MENU_R * 1.09)),
      fill: 'none', stroke: _C.hubStroke, 'stroke-width': '0.75',
    }));
    hubG.appendChild(_el('polygon', {
      points: _pts(_hex(0, 0, _MENU_R)),
      fill: _C.hubFill, stroke: _C.hubStroke, 'stroke-width': '4.5',
    }));
    if (_hub.image) {
      hubG.appendChild(_el('image', {
        href: _hub.image,
        x: -_MENU_R, y: -_MENU_R,
        width: _MENU_R * 2, height: _MENU_R * 2,
        'clip-path': `url(#${hubClipId})`,
        preserveAspectRatio: 'xMidYMid slice',
        'pointer-events': 'none',
      }));
    }
    _addText(hubG, _hub, 0, 0, _MENU_R);
    svg.appendChild(hubG);

    _navBtn.style.background = _C.navBtnBg;
    _navBtn.style.color      = _C.navBtnText;
  }

  _render();

  return {
    setSize(px) {
      _size = px;
      const vb = _VIEWBOXES[_count];
      svg.style.width  = _size + 'px';
      svg.style.height = Math.round(_size * vb.aspect) + 'px';
    },
    setCount(n) {
      _count = Math.min(Math.max(n, 1), 6);
      _selected.clear(); _hideNavBtn(); _render();
    },
    setTheme(name) { _C = THEMES[name] ?? THEMES.dark; _render(); },
    setNavMode(mode) { _navMode = mode; _hideNavBtn(); },
    setActive(index, active) {
      const ref = _itemRefs[index];
      if (!ref) return;
      if (active) { _selected.add(index); ref.ringEl.setAttribute('stroke-opacity', '1'); }
      else        { _selected.delete(index); ref.ringEl.setAttribute('stroke-opacity', '0'); }
      if (_satG) {
        Array.from(_satG.children).forEach((s, si) => {
          s.style.opacity = _selected.size === 0 || _selected.has(si) ? '1' : _C.dimOpacity;
        });
      }
    },
    destroy() { root.removeChild(svg); root.removeChild(_navBtn); },
  };
}

/* =====================================================================
   DEMO SETUP
   ===================================================================== */

const DEMO_ITEMS = [
  { id: 'home',    label: 'Home',    emoji: '🏠', sublabel: 'Dashboard' },
  { id: 'map',     label: 'Map',     emoji: '🗺'  },
  { id: 'badges',  label: 'Badges',  emoji: '🏅'  },
  { id: 'chat',    label: 'Chat',    emoji: '💬'  },
  { id: 'stats',   label: 'Stats',   emoji: '📊'  },
  { id: 'profile', label: 'Profile', emoji: '👤' },
];

const HUB = { label: 'Ninja', sublabel: 'HQ' };

const NAV_MODES = [
  { key: 'both',   label: 'Click × 2 + Button' },
  { key: 'click2', label: 'Click × 2' },
  { key: 'button', label: 'Button only' },
  { key: 'select', label: 'Select only' },
];

function buildPane(containerId, countId, modeId, logId, theme) {
  let grid        = null;
  let activeMode  = 'both';
  let activeCount = 6;

  function log(msg) {
    document.getElementById(logId).textContent = msg;
  }

  function rebuild(count) {
    activeCount = count;
    document.getElementById(containerId).innerHTML = '';

    grid = createHexGrid('#' + containerId, {
      size:    340,
      count:   count,
      theme,
      navMode: activeMode,
      hub:     HUB,
      items:   DEMO_ITEMS.slice(0, count).map(it => ({
        ...it,
        onSelect: (item) => log(`selected: ${item.id}`),
        onClick:  (item) => log(`navigating → ${item.id} (no href set)`),
      })),
    });

    document.querySelectorAll(`#${countId} .count-btn`).forEach(b =>
      b.classList.toggle('active', parseInt(b.dataset.n) === count)
    );
  }

  /* Count buttons */
  const countEl = document.getElementById(countId);
  for (let i = 1; i <= 6; i++) {
    const btn = document.createElement('button');
    btn.className = 'count-btn' + (i === 6 ? ' active' : '');
    btn.dataset.n = i;
    btn.textContent = i;
    btn.addEventListener('click', () => rebuild(i));
    countEl.appendChild(btn);
  }

  /* Nav mode buttons */
  const modeEl = document.getElementById(modeId);
  NAV_MODES.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (m.key === 'both' ? ' active' : '');
    btn.textContent = m.label;
    btn.addEventListener('click', () => {
      activeMode = m.key;
      grid.setNavMode(m.key);
      log(`mode: ${m.label}`);
      modeEl.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    modeEl.appendChild(btn);
  });

  rebuild(6);
}

buildPane('darkDemo',  'darkCounts',  'darkModes',  'darkLog',  'dark');
buildPane('lightDemo', 'lightCounts', 'lightModes', 'lightLog', 'light');
</script>
</body>
</html>
